fullnameOverride: manufacturing-service

image:
  repository: 221082205777.dkr.ecr.us-east-1.amazonaws.com/manufacturing-service
  tag: sha-ef1ccc7
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8085
  targetPort: 8085

ingress:
  enabled: false
  className: nginx
  host: prod.pharma.internal
  path: /manufacturing
  pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFromIngressController: false
  allowFromApiGateway: true
  ingressControllerNamespace: ingress-nginx
  ingressControllerPodLabels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller

livenessProbe:
  path: /actuator/health
  port: 8085
  initialDelaySeconds: 90
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  path: /actuator/health/readiness
  port: 8085
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

configmap:
  SPRING_PROFILES_ACTIVE: prod
  DB_HOST: <RDS_ENDPOINT>
  LOG_LEVEL: WARN
  SERVER_PORT: "8085"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"

envFrom:
  - secretRef:
      name: db-credentials

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - manufacturing-service
        topologyKey: kubernetes.io/hostname

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}

serviceAccount:
  create: true
  annotations: {}
  name: manufacturing-service
